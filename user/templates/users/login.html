{% extends 'base/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
    <h2>Connexion</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Se connecter</button>
        <a href="{% url 'signup' %}">Créer un compte</a>
    </form>
</div>
{% endblock %}
