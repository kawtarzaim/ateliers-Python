{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'base/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'base/fontawesome/css/all.min.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="{% url 'home' %}">SimpliCulinary</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor01">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarColor01">

            <!-- LEFT MENU -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="{% url 'home' %}">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'product_list' %}">Nos produits</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}">Contact</a>
                </li>
            </ul>

            <!-- RIGHT MENU -->
            <ul class="navbar-nav">

                {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link">{{ user.username }}</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'logout' %}">Déconnexion</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'signup' %}">Inscription</a>
                </li>
                {% endif %}

                <!-- CART -->
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'cart_detail' %}">
                        🛒 Cart
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<script src="{% static 'base/js/bootstrap.bundle.min.js' %}"></script>

</body>
</html>
